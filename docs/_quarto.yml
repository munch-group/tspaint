project:
  type: website
  output-dir: _build
  # resources:
  #   - objects.txt
  #   - objects-test.txt

execute:
  freeze: auto
  echo: true

metadata-files:
  - api/_sidebar.yml

filters:
  - "interlinks"

interlinks:
  fast: true
  sources:
    python:
      url: https://docs.python.org/3/
    griffe:
      url: https://mkdocstrings.github.io/griffe/
    numpy:
      url: https://numpy.org/doc/stable/
    pandas:
      url: https://pandas.pydata.org/docs/
    matplotlib:
      url: https://matplotlib.org/stable/
    scipy:
      url: https://docs.scipy.org/doc/scipy/
    statsmodels:
      url: https://www.statsmodels.org/stable/
    tskit:
      url: https://tskit.dev/tskit/docs/stable/
    msprime:
      url: https://tskit.dev/msprime/docs/stable/
    # quartodoc-test:
    #   url: https://machow.github.io/quartodoc
    #   inv: objects-test.txt

website:
  title: "tspaint"
  page-navigation: true
  navbar:
    left:
      - href: pages/overview.qmd
        text: Overview
      - href: pages/results.qmd
        text: Results
      - href: api/
        text: API reference
    right:
      - icon: github
        href: https://github.com/munch-group/tspaint/
  sidebar:
    - id: pages
      title: Guide
      style: floating
      align: left
      contents:
        - pages/overview.qmd
        - section: "Theory"
          contents:
            - pages/model.qmd
            - pages/inference.qmd
            - pages/dating.qmd
            - pages/assumptions.qmd
            - pages/code_paths.qmd
        - section: "Benchmarking"
          contents:
            - notebooks/bench_Ne_diverg.ipynb
            - notebooks/bench_impure_refs.ipynb
            - notebooks/bench_ref_proxies.ipynb
            - notebooks/bench_admix_time.ipynb
        - section: "Notebooks"
          contents:
            - notebooks/showcase.ipynb
            - notebooks/painting.ipynb
            - notebooks/calibration.ipynb
            - notebooks/fragmentation.ipynb
            - notebooks/bp_smoother.ipynb
            - notebooks/dating.ipynb
            - notebooks/introgression_qc.ipynb
            - notebooks/neanderthal_power.ipynb
        - pages/results.qmd

lightbox: true

format:
  html:
    theme: cosmo
    css:
      - api/_styles-quartodoc.css
      - styles.css
      # - custom.scss
    toc: true
    # code-block-background: false
    # code-block-border-left: true    
    # highlight-style: arrow
    mermaid:
      theme: neutral 

quartodoc:
  package: tspaint
  style: pkgdown
  dir: api
  render_interlinks: true
  options:
    signature_name: full
  renderer:
    style: markdown
    table_style: description-list
  sidebar: "api/_sidebar.yml"
  css: "api/_styles-quartodoc.css"

  sections:
    - title: Painting local ancestry
      desc: |
        The high-level entry point: fit the ancestry CTMC on the reference tips and paint the
        query haplotypes. `paint` returns a `Painting`; `fit` exposes the EM directly.
      contents:
        - paint
        - Painting
        - WindowedPainting
        - fit
        - FitResult
    - title: Output & segmentation
      desc: |
        The soft per-haplotype posterior (`Segment` tracks) and its collapse into hard ancestry
        tracts for downstream tract-length / admixture-dating analysis. `SoftTrack` is the
        model-agnostic read-out surface (`segments` / `posterior_at` / `plot`) that both `Painting`
        and `GhostResult` subclass; `compare_tracks` plots several painters side by side.
      contents:
        - output.posterior_table
        - output.hard_segments
        - output.Segment
        - output.missing_info_mask
        - output.posterior_at
        - SoftTrack
        - track.SegmentTrack
        - track.compare_tracks
    - title: Reference QC & ghost / archaic introgression
      desc: |
        Two user-facing tasks. **Task 1 — reference QC:** audit a panel for admixture /
        mislabelling and control it, with `reference_qc` (a single tree sequence or a SINGER
        ensemble) whose result yields the actionable `.soft_refs()` / `.mask()` for a cleaned
        re-paint (`paint(soft_refs=…)` down-weight or `paint(mask=…)` fragment masking), plus
        `foreign_tracts` (anonymous foreign tracts; `min_depth=` gives the fast deterministic
        deep-ghost flag). **Task 2 — ghost search:** `detect_ghost`, the reference-free
        depth-emission HMM, for accurate calibrated
        per-locus `P(ghost)` — accepts a SINGER ensemble and a calibration-robust `depth="rank"`.
        Both read the leave-one-out map (`tspaint.introgression`, `tspaint.archaic`).
        (`detect_archaic` is a deprecated alias of `detect_ghost`.)
      contents:
        - reference_qc
        - introgression.ReferenceQC
        - foreign_tracts
        - output.loo_posterior_table
        - introgression.foreignness_track
        - introgression.ForeignnessSegment
        - detect_ghost
        - GhostResult
    - title: Validation metrics
      desc: |
        Accuracy, calibration, and fragmentation / tract-length metrics for simulated-truth
        experiments (the `tspaint.metrics` namespace).
      contents:
        - validate.balanced_accuracy
        - validate.per_base_accuracy
        - validate.mean_confidence
        - validate.reliability_curve
        - validate.breakpoint_precision_recall
        - validate.switch_density
        - validate.tract_boundary_error
        - validate.breakpoint_flicker
        - validate.accuracy_by_segment_size
        - validate.global_proportion
        - validate.true_proportion
        - validate.map_truth
    - title: Comparators (head-to-head)
      desc: |
        Painters scored on equal footing by a uniform harness — the full method, a runnable
        ARG-native baseline, and the RFMix incumbent (the `tspaint.compare` namespace).
      contents:
        - compare.tspaint_paint
        - compare.nearest_reference_paint
        - compare.rfmix_paint
        - compare.head_to_head
        - compare.score_painter
    - title: VCF benchmark harness
      desc: |
        Run the field comparators (RFMix, gnomix, SALAI-Net, Recomb-Mix) from VCF input through one
        uniform contract and score them against simulated truth (the `tspaint.benchmark` namespace;
        CLI `tspaint benchmark`). `run` shells out to a tool's own pixi env and parses its calls into
        a tspaint painting `.npz`; `export_vcf` writes query / reference VCFs + a re-keyed truth table
        from a simulation; `score` builds the leaderboard; `setup` / `tool_status` provision and
        report the git-only tools.
      contents:
        - benchmark.run
        - benchmark.export_vcf
        - benchmark.score
        - benchmark.setup
        - benchmark.tool_status
    - title: Input front ends
      desc: |
        Obtain a tspaint-ready tree sequence from genotypes (the `tspaint.io` namespace). The
        inference front ends `tsinfer`, `singer` and `argweaver` take the same `source` (dispatched by
        `source_kind`) — a tree sequence, a VCF Zarr, or a VCF; `relate` converts Relate `.anc` /
        `.mut` output; `singer_window` / `singer_windowed` stream SINGER over genome windows.
        `estimate_ne` gives the whole-panel `Ne` SINGER's coalescent prior needs. (The pre-unification
        names `infer_tree_sequence` / `singer_tree_sequences` / `convert_relate` remain as deprecated
        aliases.)
      contents:
        - io.tsinfer
        - io.relate
        - io.singer
        - io.singer_window
        - io.singer_windowed
        - io.argweaver
        - io.estimate_ne
        - io.add_mutations
        - io.write_haploid_vcf
        - io.write_vcz
        - io.check_persistence
        - io.source_kind
        - io_genotypes.Variants
    - title: Horizontal BP/EP smoother
      desc: |
        The §7 horizontal coupling — a genome-axis forward-backward over each tip's per-tree
        beliefs that suppresses spurious switches on inferred ARGs (the `tspaint.bp` namespace;
        also `paint(smooth=True)`).
      contents:
        - bp.bp_paint
        - bp.bp_smooth
        - bp.bp_smooth_track
        - bp.bp_vs_deadband_experiment
    - title: Admixture dating (rate through time)
      desc: |
        An optional, separate deliverable from painting: a time-inhomogeneous directional
        mugration EM that estimates the cross-ancestry transition rates `q_AB(t)`, `q_BA(t)` as
        functions of (backward) time — locating divergence / gene-flow epochs and their direction
        (the `tspaint.dating` namespace; also `Painting.rate_through_time()`).
      contents:
        - fit_rate_through_time
        - RateThroughTime
        - EnsembleRateThroughTime
        - dating.split_time
        - dating.split_times
        - dating.paint_qt
        - dating.rate_through_time_binned
        - dating.make_Q_of_cell
        - dating.directional_rate_splines
        - dating.fit_poisson_spline
        - dating.select_lambda_gcv
        - dating.log_time_grid
        - dating.split_branch
        - dating.branch_cell_stats
        - dating.composite_transition
        - dating.accumulate_time_binned
        - dating.accumulate_time_binned_tv
        - dating.cell_centers
    - title: Simulation (known truth)
      desc: |
        msprime admixture scenarios with census-event ground truth — the primary validation track.
        Call an `admixture_demography_*` builder (its populations are **role-tagged**), pass it to
        `simulate_admixture`, and get a `Simulation` back — `.ts` (optionally mutated), `.queries`,
        `.labels`, `.truth_states` and `.sample_sets` — with no population-name constants needed.
      contents:
        - simulate_admixture
        - sim.Simulation
        - local_ancestry_truth
        - sim.admixture_demography
        - sim.simulate_admixture_impure_refs
        - sim.admixture_demography_impure_refs
        - sim.simulate_admixture_source_gene_flow
        - sim.admixture_demography_source_gene_flow
        - sim.simulate_admixture_with_ref_proxies
        - sim.admixture_demography_with_ref_proxies
        - sim.simulate_admixture_with_ghost
        - sim.admixture_demography_with_ghost
    - title: Generators & model
      desc: |
        The ancestry CTMC generator, transition matrices, stationary distribution, and the tip
        emission model — including `MaskedEmissions`, the position-dependent emission that lets a
        reference be masked (emit the query emission) over flagged spans, i.e. **fragment masking**
        (`paint(mask=)` / `fit(mask=)`, fed from `ReferenceQC.mask()` / `foreign_tracts`).
      contents:
        - make_generator_2state
        - model.transition_matrix
        - model.stationary_distribution
        - model.tip_emission
        - model.query_emission
        - model.MaskedEmissions
        - model.validate_generator
    - title: Experiment drivers
      desc: |
        End-to-end drivers used to produce the validation results (the `tspaint.experiments`
        namespace).
      contents:
        - experiments.admixture_experiment
        - experiments.age_sweep
        - experiments.scaling_sweep
        - experiments.fragmentation_experiment
        - experiments.arg_ensemble_experiment
        - experiments.singer_ensemble_experiment
        - experiments.impure_reference_experiment
        - experiments.impure_reference_sweep
        - experiments.archaic_detection_experiment
        - experiments.flicker_vs_true_boundaries
    - title: ARG-posterior ensemble merge
      desc: |
        Marginalise ARG uncertainty by averaging per-position paintings across a posterior
        ensemble (e.g. SINGER samples).
      contents:
        - ensemble.merge_posterior_tables
        - ensemble.MergedSegment
    - title: Lower-level machinery
      desc: |
        The pieces underneath the EM: per-root pruning, edge-blocked sufficient statistics,
        per-branch Van Loan reward integrals, the closed-form M-step, and persistence
        diagnostics.
      contents:
        - pruning.prune_tree
        - pruning.prune_root
        - pruning.PruneResult
        - accumulate.accumulate_sufficient_statistics
        - accumulate.SuffStats
        - branch_stats.branch_expected_stats
        - branch_stats.branch_kernel
        - branch_stats.stats_from_kernel
        - branch_stats.vanloan_integral
        - em.build_emissions
        - model.emissions_for
        - em.m_step_Q
        - em.m_step_pi
        - em.m_step_w
        - ranked.ranked_tree_sequence
        - diagnostics.persistence_summary
        - diagnostics.node_persistence
        - diagnostics.edge_span_summary
