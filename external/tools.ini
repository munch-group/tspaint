# tspaint external comparators — provisioned by `tspaint benchmark install` (alias: `setup`).
#
# These tools are NOT on conda/PyPI: each is a GitHub repo that must be cloned and built into its
# own environment. `tspaint benchmark install` clones each at the pinned commit into external/<dir>
# (gitignored), drops in the tracked pixi env recipe (external/envs/<dir>/pixi.toml — these are our
# own glue; they are NOT in the upstream repos), solves the env (`pixi install`), runs the env's
# build task(s), and any extract step. The benchmark bridges then find the tools via
# TSPAINT_<TOOL>_DIR / TSPAINT_RECOMBMIX, defaulting to these external/ paths.
#
# Not here, on purpose:
#   RFMix        — bioconda, via the `compare` pixi feature.
#   Relate/SINGER/ARGweaver — ARG *front ends*, not comparators: `tspaint install <tool>`.
#                  (ARGweaver now builds the **Siepel fork**, i.e. ARGweaver *and* ARGweaver-D.)
#   HAPMIX       — 2009 C, unmaintained and unlikely to build. FLARE is its living descendant.
#   ELAI/LAMP-LD — superseded, and MOSAIC already benchmarks them for us.
#
# Cloning is a partial (--filter=blob:none) + cone sparse-checkout: these repos carry large
# in-repo data and history (Recomb-Mix ~2 GB) we don't need, so we fetch only the code paths.
#
# Fields: repo, commit (pin), dir (subdir under the clone root), sparse (space-separated cone
# paths to check out — root files are always included), check (path that must exist after a
# successful setup), pixi (tracked env recipe, relative to external/, copied into the clone then
# `pixi install`-ed), task (comma-separated pixi task names run via `pixi run` — e.g. a build or a
# pip-install of requirements), build/post (shell, run in <dir>), binary (the executable the bridge
# calls), platforms + note (see below).
#
# On `platforms`: a space-separated list of conda platform tags a tool can be built on. If this
# machine is not among them, `benchmark install` **skips** the tool — nothing is cloned, the run is
# not marked failed, and the optional `note` is printed as the actionable reason. Declare a platform
# limit HERE, never as a shell guard inside `build`: a guard means we clone the repo, run it, and
# then report FAILED, so a known upstream limitation looks like a broken install.
#
# On `check`: it must name an artifact produced by the *last* step, not a repo file — otherwise a
# clone whose build or pip step failed still reports "installed". Compiled tools check their binary
# (RecombMix_v0.7, flare.jar) or install tree (Rlib/MOSAIC/DESCRIPTION); pip-only tools check a
# `.deps-ok` marker written by the task after an import smoke-test.

[gnomix]
repo = https://github.com/AI-sandbox/gnomix
commit = e758f2c8108b660c6321c6a1b168b3a79e85a02d
dir = gnomix
pixi = envs/gnomix/pixi.toml
sparse = src configs
task = install-deps
# .deps-ok, not gnomix.py: a repo file exists straight after `git clone`, so it would report a
# clone whose pip step had failed as "installed".
check = .deps-ok

[salai]
repo = https://github.com/AI-sandbox/SALAI-Net
commit = 6ea96385a724a9455906846464e420aa2c07975f
dir = SALAI-Net
pixi = envs/SALAI-Net/pixi.toml
sparse = src
task = install-deps
# post: extract the shipped models, then apply SALAI-Net's one numpy-2 source fix — `int(ancestry)`
# on a size-1 np.unique() array, which numpy 2.x rejects (idempotent; re-running is a no-op).
# NB: upstream's `models.tar.gz` is misnamed — it is a *plain* (uncompressed) POSIX tar, not gzip,
# so use `tar xf` (auto-detects compression) rather than `tar xzf` (which forces gzip and dies
# with "not in gzip format").
post = tar xf models.tar.gz && python3 -c 'import pathlib as P; f=P.Path("src/dataloaders/genome_datasets.py"); t=f.read_text(); f.write_text(t.replace("ancestry = int(ancestry)", "ancestry = int(ancestry[0])"))'
check = models/main_model/models/best_model.pth

[recombmix]
repo = https://github.com/ucfcbb/Recomb-Mix
commit = 2d783ffa034039c78576c83b8397c85193363043
dir = Recomb-Mix
pixi = envs/Recomb-Mix/pixi.toml
sparse = src
task = build
binary = RecombMix_v0.7
check = RecombMix_v0.7

# ---------------------------------------------------------------------------------------------
# Added from the comparator review (papers/*.md, plans/PLAN_PUBLICATION.md).
# ---------------------------------------------------------------------------------------------

# THE head-to-head. GhostBuster (Loya, Hinch, Palamara, Speidel & Myers 2026) consumes a **tskit
# tree sequence** — the same object tspaint paints — so it is the only comparator with no VCF
# bridge and no front-end confound: same ARG in, different model, compare R². It decides whether a
# methods paper exists (PLAN §2.2). Python; deps pinned in requirements.txt.
[ghostbuster]
repo = https://github.com/MyersGroup/GhostBuster
commit = 8d30dc8b55f9654bee930cb4b265153621b700ee
dir = GhostBuster
pixi = envs/GhostBuster/pixi.toml
sparse = src example
task = install-deps
check = .deps-ok

# SPECIAL CASE (R). MOSAIC (Salter-Townshend & Myers 2019) — the strongest genotype-based
# comparator: beats RFMix/ELAI/LAMP-LD *even when they are given the panel<->ancestry correspondence
# and it is not*, and best-in-class on small panels. Also the source of `E[r²]` and `Rst`, which we
# are adopting (PLAN §4.1). Installs into a clone-local Rlib/ (see envs/MOSAIC/pixi.toml).
[mosaic]
repo = https://github.com/mststats/MOSAIC
commit = d1120d1dfa93db7a6d374006999a0f06245ebf15
dir = MOSAIC
pixi = envs/MOSAIC/pixi.toml
sparse = R src man inst
task = install
check = Rlib/MOSAIC/DESCRIPTION

# SPECIAL CASE (JVM). FLARE (Browning, Waples & Browning 2023) — the maintained descendant of the
# HAPMIX/Li-Stephens lineage, and one of the three methods that beat Recomb-Mix past 200 generations
# (our target regime). Upstream ships no release and no jar in-repo, so we build from source at the
# pin, per their README, rather than curl an unpinned jar.
[flare]
repo = https://github.com/browning-lab/flare
commit = d6a6c8fd4479ebdb68529824acd11d2b6bbac4a1
dir = flare
pixi = envs/flare/pixi.toml
sparse = src
task = build
binary = flare.jar
check = flare.jar

# Loter (Dias-Alves, Mairal & Blum 2018) — the other deep-admixture opponent, and the closest
# competitor to tspaint's own "no genetic map / non-model species" pitch. No biological parameters
# at all. Python package with a C++ extension in python-package/.
[loter]
repo = https://github.com/bcm-uga/Loter
commit = 5c913544c3e62f4ab553fe9ca4d777e86943f22b
dir = Loter
pixi = envs/Loter/pixi.toml
sparse = python-package
task = install
check = .deps-ok

# CLUES2 (Vaughn & Nielsen 2024) — NOT a painter, so no `benchmark <tool>` runner: it is the
# downstream consumer for the uncertainty-propagation experiment (PLAN §5.1/§9.4), where ARGMix
# inferred selection from hard, uncalibrated ancestry calls with no error bar. Ships SingerToCLUES.py,
# so it reads the same SINGER ARGs we do.
[clues2]
repo = https://github.com/avaughn271/CLUES2
commit = b20dc5df6b8e6c93a1cfaf2ea6d0f09d04f4c52b
dir = CLUES2
pixi = envs/CLUES2/pixi.toml
sparse = examples
task = install-deps
check = .deps-ok

# ARGformer (Bonet, Shanks, Comajoan Cara, Abante & Ioannidis 2026) — NOT a painter (embeddings +
# nearest-neighbour retrieval), so no runner. Needed for exactly one experiment: the withheld-
# Denisovan ghost contrast (PLAN §5.2) — its retrieval *cannot* find Denisovan segments without a
# Denisovan reference in the corpus; detect_ghost needs none.
#
# LINUX-64 ONLY, declared via `platforms` — so `benchmark install` **skips** it on macOS with a
# one-line reason instead of cloning the repo and then failing a shell guard. Upstream's env pins
# pytorch-cuda + cuda-toolkit + triton, none of which exist for macOS. We tried a portable CPU recipe
# and abandoned it: ARGformer imports MosaicML `composer`, which is not on conda-forge, and mixing it
# into a conda env on osx-arm64 does not converge — plain pip clobbers the conda torch/numpy,
# `--no-deps` needs composer's transitive tree hand-fed one ImportError at a time (torchvision,
# mcli, …), and constraining pip to the conda versions just moves the failure to a from-source pyyaml
# build. Not worth it for a tool that is not a painter, is needed for exactly one experiment (the
# withheld-Denisovan retrieval contrast, PLAN §5.2), and would run on a GPU cluster anyway.
#
# No `pixi` field: on Linux we use *upstream's own* pixi.toml/pixi.lock (root files, so the cone
# sparse-checkout brings them in), i.e. the env exactly as its authors intend.
[argformer]
repo = https://github.com/AI-sandbox/ARGformer
commit = dabf56a11af9e3da3a775fabfbba76e2aaaf2883
dir = ARGformer
platforms = linux-64
note = Upstream's env pins pytorch-cuda + triton, and its MosaicML/composer stack does not resolve in a conda env on macOS. Provision it on a Linux cluster (e.g. GenomeDK).
sparse = src yamls
build = pixi install && pixi run python -c 'import torch, composer.utils' && touch .deps-ok
check = .deps-ok
