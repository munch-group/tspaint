# tspaint external benchmark comparators — provisioned by `tspaint benchmark setup`.
#
# These three local-ancestry tools are NOT on conda/PyPI: each is a GitHub repo that must be
# cloned and built into its own environment. `tspaint benchmark setup` clones each at the pinned
# commit into external/<dir> (gitignored), drops in the tracked pixi env recipe (external/envs/
# <dir>/pixi.toml — these are our own glue; they are NOT in the upstream repos), solves the env
# (`pixi install`), runs the env's build task(s), and any extract step. The benchmark bridges then
# find the tools via TSPAINT_<TOOL>_DIR / TSPAINT_RECOMBMIX, defaulting to these external/ paths.
#
# RFMix is deliberately absent — it installs from bioconda via the `compare` pixi feature.
#
# Fields: repo, commit (pin), dir (subdir under the clone root), check (path that must exist after
# a successful setup), pixi (tracked env recipe, relative to external/, copied into the clone then
# `pixi install`-ed), task (comma-separated pixi task names run via `pixi run` — e.g. a build),
# post (shell, run in <dir>), binary (the executable the bridge calls, relative to <dir>).

[gnomix]
repo = https://github.com/AI-sandbox/gnomix
commit = e758f2c8108b660c6321c6a1b168b3a79e85a02d
dir = gnomix
pixi = envs/gnomix/pixi.toml
check = gnomix.py

[salai]
repo = https://github.com/AI-sandbox/SALAI-Net
commit = 6ea96385a724a9455906846464e420aa2c07975f
dir = SALAI-Net
pixi = envs/SALAI-Net/pixi.toml
post = tar xzf models.tar.gz
check = models/main_model/models/best_model.pth

[recombmix]
repo = https://github.com/ucfcbb/Recomb-Mix
commit = 2d783ffa034039c78576c83b8397c85193363043
dir = Recomb-Mix
pixi = envs/Recomb-Mix/pixi.toml
task = build
binary = RecombMix_v0.7
check = RecombMix_v0.7
