[workspace]
authors = ["Kasper Munch <kaspermunch@birc.au.dk>"]
channels = ["conda-forge", "munch-group"]
name = "GhostBuster"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

# GhostBuster (Loya, Hinch, Palamara, Speidel & Myers 2026) — the closest comparator we have: it
# consumes a **tskit tree sequence**, the same object tspaint paints, so it is the one head-to-head
# with no VCF bridge and no front-end confound (see papers/ghostbuster.md, plans/PLAN_PUBLICATION.md
# §2.2).
#
# WHY WE DO NOT `pip install -r requirements.txt` (we hit both of these; do not "simplify" it back):
#
#  1. It pins `msprime==1.3.0`, which has no osx-arm64 wheel, so pip builds it from sdist — and the
#     extension is linked with macOS's `-undefined dynamic_lookup`, deferring GSL symbols to load
#     time, where they are not found:
#         ImportError: symbol not found in flat namespace '_gsl_rng_default'
#     conda-forge's msprime is built against conda's gsl and just works.
#
#  2. Mixing pip into a conda env silently overwrites conda-managed scipy/numpy with PyPI wheels and
#     leaves a half-broken scipy:
#         ImportError: cannot import name '_promote' from 'scipy.spatial.transform._rotation'
#
# It also pins `pysnptools`, which **GhostBuster never imports** (checked: no `import pysnptools`
# anywhere in ghost_buster.py, ld_curve_dating.py or src/) — a stale requirement. Everything the
# code actually imports has a conda-forge build, so the env is pure conda and there is no pip step.
[tasks]
install-deps = "python -c 'import tskit, msprime, numba, scipy, sklearn, joblib, matplotlib, tqdm, pandas' && touch .deps-ok"

[dependencies]
python = "3.11.*"
msprime = ">=1.3"
tskit = ">=0.5.8"
numpy = ">=2.0"
numba = "*"
scipy = "*"
pandas = "*"
scikit-learn = "*"
statsmodels = "*"
matplotlib-base = "*"
seaborn = "*"
joblib = "*"
tqdm = "*"
requests = "*"
