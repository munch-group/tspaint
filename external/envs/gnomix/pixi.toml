[workspace]
authors = ["Kasper Munch <kaspermunch@birc.au.dk>"]
channels = ["conda-forge", "munch-group"]
name = "gnomix"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

# gnomix's Python deps are pinned in its own requirements.txt (scikit-learn, scikit-allel,
# xgboost, sklearn-crfsuite, pandas, …); `tspaint benchmark setup` runs this task after the env
# is created (it provides python + pip) to install them into the env.
[tasks]
install-deps = "pip install -r requirements.txt && python -c 'import xgboost, sklearn, allel' && touch .deps-ok"

[dependencies]
pip = ">=26.1.2,<27"
